<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpensePilot- Income & Expense Tracker</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: background-color 0.4s ease, color 0.4s ease; }
        
        /* Animations */
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes slideInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 10px rgba(102, 126, 234, 0.3); } 50% { box-shadow: 0 0 20px rgba(102, 126, 234, 0.6); } }
        @keyframes scaleUp { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes ripple { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
        @keyframes rotateSun { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes floatMoon { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-5px); } }
        @keyframes rotateSlice { from { transform: rotate(-90deg); opacity: 0; } to { transform: rotate(0deg); opacity: 1; } }
        
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
            animation: slideInUp 0.6s ease;
        }
        
        .navbar h1 { font-size: 1.8rem; font-weight: 700; }
        .navbar p { font-size: 0.9rem; opacity: 0.9; }
        .navbar-brand { display: flex; align-items: center; gap: 1rem; }
        .navbar-brand-logo { 
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            animation: spin 8s linear infinite;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
            flex-shrink: 0;
        }
        
        .theme-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            cursor: pointer;
            padding: 0.6rem 0.8rem;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .theme-toggle:before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            animation-duration: 0.6s;
        }
        
        .theme-toggle:active:before {
            animation: ripple 0.6s ease-out;
        }
        
        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.2);
            border-color: rgba(255, 255, 255, 0.6);
        }
        
        .theme-toggle svg {
            width: 24px;
            height: 24px;
            animation: rotateSun 20s linear infinite;
        }
        
        .theme-toggle svg.moon {
            animation: floatMoon 2s ease-in-out infinite;
        }
        
        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 100%);
            color: #e2e8f0;
        }
        
        body.light-mode {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            color: #1e293b;
        }
        
        .dark-mode .card {
            background-color: rgba(30, 41, 59, 0.8);
            border-color: rgba(51, 65, 85, 0.5);
            color: #e2e8f0;
            backdrop-filter: blur(10px);
        }
        
        .light-mode .card {
            background-color: rgba(255, 255, 255, 0.8);
            border-color: rgba(226, 232, 240, 0.5);
            color: #1e293b;
            backdrop-filter: blur(10px);
        }
        
        .card {
            border: 1px solid;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: slideInUp 0.6s ease backwards;
        }
        
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        
        .card:hover {
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.2);
            transform: translateY(-8px);
            border-color: rgba(102, 126, 234, 0.3);
        }
        
        .grid-3 { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 1.5rem; 
        }
        .grid-2 { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 1.5rem; 
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.75rem;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-weight: 600;
            position: relative;
            overflow: hidden;
            transform: perspective(600px);
        }
        
        .btn:before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: translate(-50%, -50%);
        }
        
        .btn:active:before {
            animation: ripple 0.6s ease-out;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.5);
        }
        
        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);

        .btn-form-submit {
            width: 100%;
            animation: slideInUp 0.6s ease 0.6s backwards;
        }
        
        .btn-danger {
            background-color: #ef4444;
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }
        
        .btn-danger:hover {
            background-color: #dc2626;
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.5);

        .input-field {

            padding: 0.75rem;

            border-radius: 0.75rem;

        .dark-mode .input-field {

            border-color: rgba(51, 65, 85, 0.4);

        }
        
        .light-mode .input-field {

        }
        
        .input-field:focus {

            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
            transform: scale(1.02);
        }
        
        .form-group {
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            animation: slideInUp 0.6s ease backwards;
        }
        
        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }
        .form-group:nth-child(4) { animation-delay: 0.4s; }
        .form-group:nth-child(5) { animation-delay: 0.5s; }
        
        .form-label {
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }
        
        .income-color { color: #10b981; }
        .expense-color { color: #ef4444; }
        .net-color { color: #3b82f6; }
        
        .summary-value {
            font-size: 2rem;
            font-weight: 700;
            margin: 0.5rem 0;
            animation: scaleUp 0.6s ease;
        }
        
        .summary-label {
            font-size: 0.9rem;
            opacity: 0.7;
        }
        
        .tab-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid;
            animation: slideInUp 0.6s ease;
        }
        
        .dark-mode .tab-buttons {
            border-color: rgba(51, 65, 85, 0.3);
        }
        
        .light-mode .tab-buttons {
            border-color: rgba(226, 232, 240, 0.3);
        }
        
        .tab-button {
            padding: 0.75rem 1.5rem;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);

        .tab-button:before {

            bottom: -2px;

        .tab-button:hover {
            color: #667eea;
            transform: translateY(-2px);
        }
        
        .pie-chart {
            width: 100%;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.8s ease;
        }
        
        .expense-item, .income-item {
            padding: 1rem;
            border-radius: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: slideInUp 0.6s ease backwards;
        }
        
        .expense-item:hover, .income-item:hover {
            transform: translateX(10px);
        }
        
        .dark-mode .expense-item, .dark-mode .income-item {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(51, 65, 85, 0.4));
            border: 1px solid rgba(51, 65, 85, 0.4);
        }
        
        .light-mode .expense-item, .light-mode .income-item {
            background: linear-gradient(135deg, rgba(248, 250, 252, 0.8), rgba(241, 245, 249, 0.4));
            border: 1px solid rgba(226, 232, 240, 0.4);
        }
        
        .item-details {
            flex: 1;
        }
        
        .item-description {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        
        .item-meta {
            font-size: 0.85rem;
            opacity: 0.6;
        }
        
        .item-amount {
            font-weight: 700;
            font-size: 1.2rem;
            margin: 0 1rem;
            animation: scaleUp 0.6s ease;
        }
        
        .no-data {
            text-align: center;
            padding: 3rem 2rem;
            opacity: 0.6;
            animation: fadeIn 0.6s ease;
        }
        
        .progress-bar {
            height: 12px;
            background: linear-gradient(90deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border-radius: 12px;
            overflow: hidden;
            margin-top: 0.5rem;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }
        
        .dark-mode .progress-bar {
            background: linear-gradient(90deg, rgba(102, 126, 234, 0.15), rgba(118, 75, 162, 0.15));
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body class="light-mode">
    <div id="root"></div>
    
    <script>
        const { useState, useEffect } = React;
        const API_BASE = 'http://localhost:5000/api';
        
        // SVG Pie Chart Component
        function PieChart({ data, colors, size = 300, selectedSlice, onSliceClick, isIncome = false }) {
            if (!data || data.length === 0) return null;
            
            let currentAngle = 0;
            const total = data.reduce((sum, item) => sum + (item.value || 0), 0);
            
            if (total === 0) return null;
            
            const slices = data.map((item, idx) => {
                if (!item.value) return null;
                
                const sliceAngle = (item.value / total) * 360;
                const startAngle = currentAngle * (Math.PI / 180);
                const endAngle = (currentAngle + sliceAngle) * (Math.PI / 180);
                const midAngle = (currentAngle + sliceAngle / 2) * (Math.PI / 180);
                
                const x1 = 150 + 100 * Math.cos(startAngle);
                const y1 = 150 + 100 * Math.sin(startAngle);
                const x2 = 150 + 100 * Math.cos(endAngle);
                const y2 = 150 + 100 * Math.sin(endAngle);
                const labelX = 150 + 122 * Math.cos(midAngle);
                const labelY = 150 + 122 * Math.sin(midAngle);
                const largeArc = sliceAngle > 180 ? 1 : 0;
                
                const pathData = `M 150 150 L ${x1} ${y1} A 100 100 0 ${largeArc} 1 ${x2} ${y2} Z`;
                const isSelected = selectedSlice === idx;
                const percentage = ((item.value / total) * 100).toFixed(1);
                
                const result = React.createElement(React.Fragment, { key: idx },
                    React.createElement('path', {
                        d: pathData,
                        fill: colors[idx % colors.length],
                        stroke: isSelected ? 'rgba(255, 255, 255, 0.8)' : 'rgba(255, 255, 255, 0.3)',
                        strokeWidth: isSelected ? 4 : 2,
                        opacity: isSelected ? 1 : 0.9,
                        onClick: () => onSliceClick({ label: item.label, value: item.value, isIncome: isIncome, index: idx }),
                        style: {
                            animation: `rotateSlice 0.8s ease ${idx * 0.1}s`,
                            transformBox: 'fill-box',
                            transformOrigin: 'center',
                            transform: isSelected ? 'scale(1.05)' : 'scale(1)',
                            cursor: 'pointer',
                            filter: isSelected ? 'drop-shadow(0 0 12px rgba(255, 255, 255, 0.65))' : 'none',
                            transition: 'all 0.3s ease'
                        }
                    }),
                    React.createElement('text', {
                        x: labelX,
                        y: labelY,
                        textAnchor: 'middle',
                        dominantBaseline: 'middle',
                        fill: 'white',
                        fontSize: '10',
                        fontWeight: '700',
                        style: { pointerEvents: 'none', textShadow: '0 1px 2px rgba(0, 0, 0, 0.65)' }
                    }, `${item.label} ${percentage}%`)
                );
                
                currentAngle += sliceAngle;
                return result;
            }).filter(Boolean);
            
            const legendItems = data.map((item, idx) => {
                const percentage = total > 0 ? ((item.value / total) * 100).toFixed(1) : '0.0';
                return React.createElement('div', {
                    key: `${item.label}-${idx}`,
                    style: {
                        display: 'flex',
                        alignItems: 'center',
                        gap: '0.6rem',
                        padding: '0.5rem 0.75rem',
                        borderRadius: '0.75rem',
                        background: 'rgba(255, 255, 255, 0.04)',
                        border: '1px solid rgba(255, 255, 255, 0.08)'
                    }
                },
                    React.createElement('span', {
                        style: {
                            width: '12px',
                            height: '12px',
                            borderRadius: '999px',
                            background: colors[idx % colors.length],
                            flexShrink: 0,
                            boxShadow: '0 0 8px rgba(255, 255, 255, 0.15)'
                        }
                    }),
                    React.createElement('span', { style: { fontWeight: '600' } }, item.label),
                    React.createElement('span', { style: { marginLeft: 'auto', opacity: 0.8 } }, `₹${item.value.toFixed(0)} (${percentage}%)`)
                );
            });
            
            return React.createElement('div', {
                style: { width: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '1rem' }
            },
                React.createElement('svg', {
                    width: size,
                    height: size,
                    viewBox: '0 0 300 300',
                    style: { animation: 'fadeIn 0.8s ease', maxWidth: '100%', height: 'auto' }
                }, 
                    slices,
                    React.createElement('circle', {
                        cx: 150,
                        cy: 150,
                        r: 60,
                        fill: 'transparent',
                        style: { pointerEvents: 'none' }
                    })
                ),
                React.createElement('div', {
                    style: {
                        width: '100%',
                        display: 'grid',
                        gridTemplateColumns: 'repeat(auto-fit, minmax(160px, 1fr))',
                        gap: '0.75rem'
                    }
                }, legendItems)
            );
        }
        
        function ExpensePilotApp() {
            const [expenses, setExpenses] = useState([]);
            const [incomes, setIncomes] = useState([]);
            const [darkMode, setDarkMode] = useState(false);
            const [activeTab, setActiveTab] = useState('overview');
            const [filterType, setFilterType] = useState('all');
            const [selectedExpenseSlice, setSelectedExpenseSlice] = useState(null);
            const [selectedIncomeSlice, setSelectedIncomeSlice] = useState(null);
            const [expenseSliceDetails, setExpenseSliceDetails] = useState('Click on a section of the chart to see details');
            const [incomeSliceDetails, setIncomeSliceDetails] = useState('Click on a section of the chart to see details');
            
            const [expenseForm, setExpenseForm] = useState({
                amount: '', description: '', category: 'food', date: new Date().toISOString().split('T')[0], paidBy: ''
            });
            
            const [incomeForm, setIncomeForm] = useState({
                amount: '', description: '', category: 'salary', date: new Date().toISOString().split('T')[0], receivedFrom: ''
            });
            
            useEffect(() => {
                loadExpenses();
                loadIncomes();
                const savedMode = localStorage.getItem('darkMode') === 'true';
                setDarkMode(savedMode);
                document.body.className = savedMode ? 'dark-mode' : 'light-mode';
            }, []);
            
            const loadExpenses = async () => {
                try {
                    const response = await fetch(`${API_BASE}/expenses`);
                    if (response.ok) {
                        const data = await response.json();
                        setExpenses(Array.isArray(data) ? data : []);
                    } else {
                        const saved = localStorage.getItem('expenses');
                        setExpenses(saved ? JSON.parse(saved) : []);
                    }
                } catch {
                    const saved = localStorage.getItem('expenses');
                    setExpenses(saved ? JSON.parse(saved) : []);
                }
            };
            
            const loadIncomes = async () => {
                try {
                    const response = await fetch(`${API_BASE}/incomes`);
                    if (response.ok) {
                        const data = await response.json();
                        setIncomes(Array.isArray(data) ? data : []);
                    } else {
                        const saved = localStorage.getItem('incomes');
                        setIncomes(saved ? JSON.parse(saved) : []);
                    }
                } catch {
                    const saved = localStorage.getItem('incomes');
                    setIncomes(saved ? JSON.parse(saved) : []);
                }
            };
            
            const addExpense = async (e) => {
                e.preventDefault();
                if (!expenseForm.amount || !expenseForm.description || !expenseForm.paidBy) {
                    alert('Please fill all fields');
                    return;
                }
                
                const newExpense = {
                    ...expenseForm,
                    amount: parseFloat(expenseForm.amount),
                    date: new Date(expenseForm.date),
                    id: Date.now()
                };
                
                const updated = [newExpense, ...expenses];
                setExpenses(updated);
                localStorage.setItem('expenses', JSON.stringify(updated));
                
                setExpenseForm({
                    amount: '', description: '', category: 'food', date: new Date().toISOString().split('T')[0], paidBy: ''
                });
            };
            
            const addIncome = async (e) => {
                e.preventDefault();
                if (!incomeForm.amount || !incomeForm.description || !incomeForm.receivedFrom) {
                    alert('Please fill all fields');
                    return;
                }
                
                const newIncome = {
                    ...incomeForm,
                    amount: parseFloat(incomeForm.amount),
                    date: new Date(incomeForm.date),
                    id: Date.now()
                };
                
                const updated = [newIncome, ...incomes];
                setIncomes(updated);
                localStorage.setItem('incomes', JSON.stringify(updated));
                
                setIncomeForm({
                    amount: '', description: '', category: 'salary', date: new Date().toISOString().split('T')[0], receivedFrom: ''
                });
            };
            
            const deleteExpense = (id) => {
                if (!confirm('Delete this expense?')) return;
                const updated = expenses.filter(e => e.id !== id);
                setExpenses(updated);
                localStorage.setItem('expenses', JSON.stringify(updated));
            };
            
            const deleteIncome = (id) => {
                if (!confirm('Delete this income?')) return;
                const updated = incomes.filter(i => i.id !== id);
                setIncomes(updated);
                localStorage.setItem('incomes', JSON.stringify(updated));
            };
            
            const toggleDarkMode = () => {
                const newMode = !darkMode;
                setDarkMode(newMode);
                localStorage.setItem('darkMode', newMode);
                document.body.className = newMode ? 'dark-mode' : 'light-mode';
            };
            
            // Calculations
            const totalExpense = expenses.reduce((sum, e) => sum + (e.amount || 0), 0);
            const totalIncome = incomes.reduce((sum, i) => sum + (i.amount || 0), 0);
            const netBalance = totalIncome - totalExpense;
            const savingsRate = totalIncome > 0 ? ((netBalance / totalIncome) * 100).toFixed(1) : 0;
            
            const expenseByCategory = {};
            expenses.forEach(e => {
                expenseByCategory[e.category] = (expenseByCategory[e.category] || 0) + e.amount;
            });
            
            const incomeByCategory = {};
            incomes.forEach(i => {
                incomeByCategory[i.category] = (incomeByCategory[i.category] || 0) + i.amount;
            });
            
            const categoryEmojis = {
                food: '🍔', travel: '✈️', accommodation: '🏠', utilities: '⚡', miscellaneous: '📌',
                salary: '💼', freelance: '🎨', bonus: '🎁', investment: '📈', other: '💰'
            };
            
            return React.createElement(

                                            type: 'text',
                                            className: 'input-field',
                                            placeholder: 'e.g., Office lunch',
                                            value: expenseForm.description,
                                            onChange: (e) => setExpenseForm({ ...expenseForm, description: e.target.value })
                                        })
                                    ),
                                    React.createElement('div', { className: 'form-group' },
                                        React.createElement('label', { className: 'form-label' }, 'Category'),
                                        React.createElement('select', {
                                            className: 'input-field',
                                            value: expenseForm.category,
                                            onChange: (e) => setExpenseForm({ ...expenseForm, category: e.target.value })
                                        },
                                            React.createElement('option', { value: 'food' }, '🍔 Food'),
                                            React.createElement('option', { value: 'travel' }, '✈️ Travel'),
                                            React.createElement('option', { value: 'accommodation' }, '🏠 Accommodation'),
                                            React.createElement('option', { value: 'utilities' }, '⚡ Utilities'),
                                            React.createElement('option', { value: 'miscellaneous' }, '📌 Miscellaneous')
                                        )
                                    ),
                                    React.createElement('div', { className: 'form-group' },
                                        React.createElement('label', { className: 'form-label' }, 'Date'),
                                        React.createElement('input', {
                                            type: 'date',
                                            className: 'input-field',
                                            value: expenseForm.date,
                                            onChange: (e) => setExpenseForm({ ...expenseForm, date: e.target.value })
                                        })
                                    ),
                                    React.createElement('div', { className: 'form-group' },
                                        React.createElement('label', { className: 'form-label' }, 'Paid By'),
                                        React.createElement('input', {
                                            type: 'text',
                                            className: 'input-field',
                                            placeholder: 'Your name',
                                            value: expenseForm.paidBy,
                                            onChange: (e) => setExpenseForm({ ...expenseForm, paidBy: e.target.value })
                                        })
                                    ),
                                    React.createElement('button', { type: 'submit', className: 'btn btn-primary btn-form-submit' }, '➕ Add Expense')
                                )
                            ),
                            
                            React.createElement('div', { className: 'card' },
                                React.createElement('h2', { style: { marginBottom: '1rem', fontWeight: '700' } }, '💸 Expense Summary'),
                                React.createElement('div', null,
                                    Object.entries(expenseByCategory).length > 0 ? Object.entries(expenseByCategory).map(([cat, amount]) => {
                                        const percentage = totalExpense > 0 ? ((amount / totalExpense) * 100).toFixed(1) : 0;
                                        return React.createElement('div', { key: cat, style: { marginBottom: '1rem', padding: '1rem', borderRadius: '0.5rem', background: 'rgba(239, 68, 68, 0.1)' } },
                                            React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', fontWeight: '600' } },
                                                React.createElement('span', null, categoryEmojis[cat] + ' ' + cat.charAt(0).toUpperCase() + cat.slice(1)),
                                                React.createElement('span', { style: { color: '#ef4444' } }, '₹' + amount.toFixed(2) + ' (' + percentage + '%)')
                                            )
                                        );
                                    }) : React.createElement('div', { className: 'no-data' }, 'No expenses recorded yet')
                                )
                            )
                        ),
                        
                        React.createElement('div', { className: 'card' },
                            React.createElement('h2', { style: { marginBottom: '1rem', fontWeight: '700' } }, '📋 Expense History (' + expenses.length + ')'),
                            React.createElement('div', null,
                                expenses.length > 0 ? expenses.map((expense) => {
                                    return React.createElement('div', {
                                        key: expense.id || Math.random(),
                                        className: 'expense-item'
                                    },
                                        React.createElement('div', { className: 'item-details' },
                                            React.createElement('div', { className: 'item-description' }, expense.description),
                                            React.createElement('div', { className: 'item-meta' },
                                                new Date(expense.date).toLocaleDateString() + ' • ' + expense.category + ' • ' + expense.paidBy
                                            )
                                        ),
                                        React.createElement('div', null,
                                            React.createElement('div', { className: 'item-amount expense-color' }, '₹' + expense.amount.toFixed(2)),
                                            React.createElement('button', {
                                                className: 'btn btn-danger',
                                                style: { padding: '0.5rem 1rem', fontSize: '0.9rem', marginLeft: '1rem' },
                                                onClick: () => deleteExpense(expense.id)
                                            }, '🗑️')
                                        )
                                    );
                                }) : React.createElement('div', { className: 'no-data' }, 'No expenses yet. Add one to get started!')
                            )
                        )
                    )
                )
            );
        }
        
        ReactDOM.createRoot(document.getElementById('root')).render(
            React.createElement(ExpensePilotApp)
        );
    </script>
</body>
</html>
